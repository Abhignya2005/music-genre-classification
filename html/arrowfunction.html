<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>JavaScript Arrow Function</h2>
    <p>with arrow function , you dont have to type the function keyword,the return keyword , and the curly brackets.</p>
    <p>Arrow function are not supported on IE11 or earlier </p>
    <p id="demo"></p>
    <script>
        const x = (x,y)=> x*y ;
        document.getElementById("demo").innerHTML=x(5,5);
    </script>
</body>
